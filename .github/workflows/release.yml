name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      id-token: write
      contents: read
      attestations: write
    with:
      attest-package: "true"

  docs:
    name: Verify Docs Build
    uses: beeware/.github/.github/workflows/docs-build-verify.yml@741cc5a311012ee0ee195938889a337449d01eeb  # main
    permissions:
      contents: read
    secrets:
      RTD_API_TOKEN: ${{ secrets.RTD_API_TOKEN }}
    with:
      project-name: "toga"
      project-version: ${{ github.ref_name }}

  release:
    name: Create GitHub release
    needs: [ ci, docs ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set Build Variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_ENV

      - name: Get Packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "Packages-*"
          merge-multiple: true
          path: dist

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --draft --title "${VERSION}"

  deploy-test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [ ci, release ]
    permissions:
      contents: read
      # This permission is required for trusted publishing.
      id-token: write
    continue-on-error: true
    strategy:
      # One element of this matrix failing should not terminate the others mid-run.
      # This prevents one bad platform from stalling the publication of others.
      fail-fast: false
      matrix:
        package:
        # As per PEP 503 normalization, these names should all be (a) lower case, and
        # (b) use underscores. See https://github.com/pypa/packaging.python.org/pull/1032
        - "toga"
        - "toga_android"
        - "toga_cocoa"
        - "toga_core"
        - "toga_demo"
        - "toga_dummy"
        - "toga_gtk"
        - "toga_qt"
        - "toga_ios"
        - "toga_positron"
        - "toga_textual"
        - "toga_web"
        - "toga_winforms"
        - "travertino"
    steps:
      - name: Get Packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "Packages-*"
          merge-multiple: true
          path: staging_dist

      - name: Extract ${{ matrix.package }}
        run: |
          mkdir dist
          mv staging_dist/${{ matrix.package }}-[0-9]* dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
