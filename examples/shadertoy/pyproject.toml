[build-system]
requires = ["briefcase"]

[tool.briefcase]
project_name = "OpenGL Shadertoy Demo"
bundle = "org.beeware.toga.examples"
version = "0.0.1"
url = "https://beeware.org"
license = "BSD-3-Clause"
license-files = [
    "LICENSE",
]
author = "Tiberius Yak"
author_email = "tiberius@beeware.org"

formal_name = "An OpenGL Shadertoy Demo"
description = "A testing app"
requires = [
    "../../travertino",
    "../../core",
]

[tool.briefcase.app.shadertoy]
sources = ["shadertoy"]

[tool.briefcase.app.shadertoy-qt]
sources = ["shadertoy", "shadertoy_qt"]

[tool.briefcase.app.shadertoy.macOS]
requires = [
    "../../cocoa",
    "std-nslog>=1.0.0",
    "PyOpenGL",
]

[tool.briefcase.app.shadertoy.linux]
requires = [
    "../../gtk",
    "PyOpenGL",
]

[tool.briefcase.app.shadertoy-qt.linux]
requires = [
    "../../qt",
    "PyOpenGL",
]

#[tool.briefcase.app.shadertoy.windows]
#requires = [
#    "../../winforms",
#]

# Mobile deployments
[tool.briefcase.app.shadertoy.iOS]
requires = [
    "../../iOS",
    "std-nslog>=1.0.0",
]

[tool.briefcase.app.shadertoy.android]
requires = [
    "../../android",
]

base_theme = "Theme.MaterialComponents.Light.DarkActionBar"

build_gradle_dependencies = [
    "com.google.android.material:material:1.12.0",
]

# Web deployment
