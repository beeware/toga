[build-system]
requires = ["briefcase"]

[tool.briefcase]
project_name = "Button Demo"
bundle = "org.beeware.toga.examples"
version = "0.0.1"
url = "https://beeware.org"
license.file = "LICENSE"
author = "Tiberius Yak"
author_email = "tiberius@beeware.org"

formal_name = "An OpenGL Demo"
description = "A testing app"
requires = [
    "../../travertino",
    "../../core",
]

[tool.briefcase.app.opengl]
sources = ["opengl"]

[tool.briefcase.app.opengl-qt]
sources = ["opengl", "opengl_qt"]

